<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>מחולל קונטרס - מהדורת דפוס מקצועית</title>
    <link href="https://fonts.googleapis.com/css2?family=Bona+Nova+SC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #2c3e50; --accent: #d4af37; --font: 'Bona Nova SC', serif; }

        /* --- הגדרות הדפסה לבית דפוס (קווי חיתוך חיצוניים) --- */
        @media print {
            @page { 
                size: 168.5mm 230mm; /* A5 + 10mm מכל צד לקווי חיתוך */
                margin: 0; 
            }
            body { background: white; margin: 0; padding: 0; }
            .ui-container { display: none !important; }
            .preview-container { background: white !important; padding: 0 !important; overflow: visible !important; }
            
            .print-page { 
                margin: 10mm auto !important; /* מרכז את ה-A5 בתוך הדף הגדול */
                box-shadow: none !important;
                page-break-after: always !important;
                border: none !important;
            }
        }

        /* --- עיצוב ממשק --- */
        body { font-family: var(--font); background: #333; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        .ui-container { width: 380px; background: white; padding: 20px; box-shadow: 2px 0 15px rgba(0,0,0,0.5); overflow-y: auto; z-index: 100; }
        .preview-container { flex: 1; overflow-y: auto; padding: 40px; display: flex; flex-direction: column; align-items: center; scroll-behavior: smooth; }

        /* --- מבנה דף A5 עם בליד --- */
        .print-page {
            width: 148.5mm; height: 210mm; background: white; position: relative;
            margin-bottom: 50px; flex-shrink: 0;
            cursor: default; box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        /* קווי חיתוך חיצוניים (7 מ"מ) */
        .crop-mark { position: absolute; width: 15mm; height: 15mm; z-index: 10; }
        .crop-mark::before, .crop-mark::after { content: ""; position: absolute; background: black; }
        
        /* קווים אופקיים ואנכיים מחוץ לריבוע */
        .cm-tl { top: -10mm; left: -10mm; }
        .cm-tl::before { width: 7mm; height: 0.2pt; top: 10mm; left: 0; } /* אופקי */
        .cm-tl::after { width: 0.2pt; height: 7mm; left: 10mm; top: 0; }   /* אנכי */

        .cm-tr { top: -10mm; right: -10mm; }
        .cm-tr::before { width: 7mm; height: 0.2pt; top: 10mm; right: 0; }
        .cm-tr::after { width: 0.2pt; height: 7mm; right: 10mm; top: 0; }

        .cm-bl { bottom: -10mm; left: -10mm; }
        .cm-bl::before { width: 7mm; height: 0.2pt; bottom: 10mm; left: 0; }
        .cm-bl::after { width: 0.2pt; height: 7mm; left: 10mm; bottom: 0; }

        .cm-br { bottom: -10mm; right: -10mm; }
        .cm-br::before { width: 7mm; height: 0.2pt; bottom: 10mm; right: 0; }
        .cm-br::after { width: 0.2pt; height: 7mm; right: 10mm; bottom: 0; }

        /* תוכן הקונטרס */
        .frame-img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        .content { position: relative; z-index: 2; padding: 25mm 20mm; height: 100%; box-sizing: border-box; text-align: center; }

        h2 { border-bottom: 2px solid var(--accent); padding-bottom: 5px; color: var(--primary); }
        .form-section { margin-bottom: 15px; }
        input, select { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ccc; font-family: var(--font); box-sizing: border-box; }
        .btn-action { width: 100%; padding: 15px; background: var(--primary); color: white; border: none; font-size: 1.2rem; cursor: pointer; margin-top: 20px; }
        
        .holy-text { font-size: 15.5pt; line-height: 1.6; text-align: justify; white-space: pre-wrap; margin-bottom: 20px; }
        .letter-title { font-weight: bold; font-size: 19pt; display: block; margin: 15px 0 5px 0; }
    </style>
</head>
<body>

<div class="ui-container">
    <h2>הגדרות דפוס</h2>
    
    <div class="form-section">
        <label>שם הנפטר/ת:</label>
        <input type="text" id="inName" value="אברהם" oninput="update()">
    </div>

    <div class="form-section">
        <label>שם המשפחה:</label>
        <input type="text" id="inFamily" value="כהן" oninput="update()">
    </div>

    <div class="form-section">
        <label>שם האב:</label>
        <input type="text" id="inFather" value="יצחק" oninput="update()">
    </div>

    <div class="form-section">
        <label>מין:</label>
        <select id="inGender" onchange="update()">
            <option value="בן">בן</option>
            <option value="בת">בת</option>
        </select>
    </div>

    <div class="form-section">
        <label>נוסח קדיש:</label>
        <select id="inNusach" onchange="update()">
            <option value="edot">עדות המזרח</option>
            <option value="ashkenaz">אשכנז</option>
            <option value="sfard">ספרד</option>
            <option value="teiman">תימן (בלדי)</option>
        </select>
    </div>

    <button class="btn-action" onclick="window.print()">הדפס לקובץ PDF לדפוס</button>
</div>

<div class="preview-container" id="preview"></div>

<script>
    // --- כאן תדביק את הטקסט הארוך שלך ---
    const DATA = {
        tehillim: {
            'א': 'אַשְׁרֵי תְמִימֵי דָרֶךְ הַהֹלְכִים בְּתוֹרַת יְהוָה: אַשְׁרֵי נֹצְרֵי עֵדֹתָיו...',
            'ב': 'בַּמֶּה יְזַכֶּה נַּעַר אֶת אָרְחוֹ...',
            'ה': 'הוֹרֵנִי יְהוָה דֶּרֶךְ חֻקֶּיךָ...',
            'מ': 'מָה אָהַבְתִּי תוֹרָתֶךָ...',
            'נ': 'נֵר לְרַגְלִי דְבָרֶךָ...',
            'ר': 'רְאֵה עָנְיִי וְחַלְּצֵנִי...',
            'ש': 'שָׂרִים רְדָפוּנִי חִנָּם...'
        },
        mishnayot: {
            'נ': 'נִדָּה שֶׁהוֹצִיאָה דָם...',
            'ש': 'שְׁנַיִם אֹוחֲזִין בְּטַלִּית...',
            'מ': 'מֵאֵימָתַי קוֹרִין אֶת שְׁמַע...',
            'ה': 'הַמַּנִּיחַ אֶת הַכַּד בִּרְשׁוּת הָרַבִּים...'
        },
        kaddish: {
            edot: "יִתְגַּדַּל וְיִתְקַדַּשׁ שְׁמֵהּ רַבָּא... (נוסח עדות המזרח המלא)",
            ashkenaz: "יִתְגַּדַּל וְיִתְקַדַּשׁ שְׁמֵהּ רַבָּא... (נוסח אשכנז המלא - עושה השלום)",
            sfard: "יִתְגַּדַּל וְיִתְקַדַּשׁ שְׁמֵהּ רַבָּא... (נוסח ספרד המלא - ויצמח פורקניה)",
            teiman: "יִתְגַּדַּל וְיִתְקַדַּשׁ שְׁמֵהּ רַבָּא... (נוסח תימן המלא - לעילא לעילא מכל ברכתא)"
        }
    };

    function createNewPage(isCover = false) {
        const page = document.createElement('div');
        page.className = 'print-page';
        page.innerHTML = `
            <div class="crop-mark cm-tl"></div><div class="crop-mark cm-tr"></div>
            <div class="crop-mark cm-bl"></div><div class="crop-mark cm-br"></div>
            <img class="frame-img" src="${isCover ? '1.png' : '2.png'}" onerror="this.style.opacity='0'">
            <div class="content"></div>
        `;
        document.getElementById('preview').appendChild(page);
        return page.querySelector('.content');
    }

    function update() {
        const name = document.getElementById('inName').value;
        const family = document.getElementById('inFamily').value;
        const father = document.getElementById('inFather').value;
        const gender = document.getElementById('inGender').value;
        const nusach = document.getElementById('inNusach').value;
        const preview = document.getElementById('preview');
        
        preview.innerHTML = '';

        // עמוד שער
        const coverContent = createNewPage(true);
        coverContent.innerHTML = `
            <div style="font-size:28pt; font-weight:bold; margin-top:35mm;">לעילוי נשמת</div>
            <div style="font-size:36pt; font-weight:bold; margin:15mm 0;">${name} ${gender} ${father}<br>${family}</div>
            <div style="font-size:45pt;">ז"ל</div>
        `;

        // תהילים - מנגנון מעבר עמודים אוטומטי
        let currentContent = createNewPage(false);
        currentContent.innerHTML = `<div style="font-size:22pt; font-weight:bold; margin-bottom:10mm; text-decoration:underline;">תהילים פרק קי"ט</div>`;
        
        let wordsOnPage = 0;
        name.split('').forEach(letter => {
            const text = DATA.tehillim[letter] || `טקסט חסר לאות ${letter}`;
            // אם העמוד מלא (בערך 150 מילים), פתח עמוד חדש
            if (wordsOnPage > 150) { 
                currentContent = createNewPage(false);
                wordsOnPage = 0;
            }
            currentContent.innerHTML += `<span class="letter-title">אות ${letter}</span><div class="holy-text">${text}</div>`;
            wordsOnPage += text.split(' ').length + 20; 
        });

        // משניות נשמ"ה
        currentContent = createNewPage(false);
        currentContent.innerHTML = `<div style="font-size:22pt; font-weight:bold; margin-bottom:10mm; text-decoration:underline;">משניות נְשָׁמָה</div>`;
        ['נ','ש','מ','ה'].forEach(l => {
            currentContent.innerHTML += `<span class="letter-title">אות ${l}</span><div class="holy-text">${DATA.mishnayot[l] || '...'}</div>`;
        });

        // קדיש
        const kaddishContent = createNewPage(false);
        kaddishContent.innerHTML = `
            <div style="font-size:22pt; font-weight:bold; margin-bottom:8mm; text-decoration:underline;">קדיש דרבנן</div>
            <div class="holy-text" style="text-align:center; font-size:14pt;">${DATA.kaddish[nusach]}</div>
        `;
    }

    window.onload = update;
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>מחולל קונטרס מקצועי - נוסח מלא וסימני חיתוך</title>
    <link href="https://fonts.googleapis.com/css2?family=Bona+Nova+SC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #2c3e50; --accent: #d4af37; --font: 'Bona Nova SC', serif; }
        
        @media print {
            @page { size: A5; margin: 0; }
            html, body { overflow: visible !important; height: auto !important; }
            .ui-container { display: none !important; }
            .preview-container { background: white !important; padding: 0 !important; overflow: visible !important; }
            .print-page { margin: 0 !important; box-shadow: none !important; page-break-after: always !important; }
        }

        body { font-family: var(--font); background: #f0f0f0; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        .ui-container { width: 350px; background: white; padding: 20px; box-shadow: 2px 0 10px rgba(0,0,0,0.1); overflow-y: auto; z-index: 100; }
        .preview-container { flex: 1; overflow-y: auto; padding: 40px; display: flex; flex-direction: column; align-items: center; background: #525659; }

        .print-page {
            width: 148.5mm; min-height: 210mm; background: white; position: relative;
            margin-bottom: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.3); overflow: hidden; display: flex; flex-direction: column;
        }

        .frame-img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        .content { position: relative; z-index: 2; padding: 25mm 18mm; flex-grow: 1; text-align: center; }

        /* קווי חיתוך 7 מ"מ */
        .crop-marks .cm { position: absolute; width: 7mm; height: 7mm; border: 0.1pt solid #000; z-index: 10; }
        .cm-tl { top: 0; left: 0; border-right: none; border-bottom: none; }
        .cm-tr { top: 0; right: 0; border-left: none; border-bottom: none; }
        .cm-bl { bottom: 0; left: 0; border-right: none; border-top: none; }
        .cm-br { bottom: 0; right: 0; border-left: none; border-top: none; }

        input, select { width: 100%; padding: 8px; margin: 5px 0 15px; border: 1px solid #ccc; font-family: var(--font); box-sizing: border-box; }
        .btn-print { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; cursor: pointer; font-size: 1.1rem; }
        
        .letter-tag { font-weight: bold; font-size: 18pt; display: block; margin-top: 15px; text-decoration: underline; }
        .holy-text { font-size: 15pt; line-height: 1.5; text-align: justify; white-space: pre-wrap; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="ui-container">
    <h2>עריכת קונטרס</h2>
    <input type="text" id="inName" placeholder="שם הנפטר/ת" oninput="update()">
    <input type="text" id="inFamily" placeholder="שם משפחה" oninput="update()">
    <input type="text" id="inFather" placeholder="שם האב" oninput="update()">
    <select id="inGender" onchange="update()"><option value="בן">בן</option><option value="בת">בת</option></select>
    
    <label>נוסח קדיש:</label>
    <select id="inNusach" onchange="update()">
        <option value="edot">עדות המזרח</option>
        <option value="ashkenaz">אשכנז</option>
        <option value="sfard">ספרד</option>
        <option value="teiman">תימן (בלדי)</option>
    </select>

    <label><input type="checkbox" id="showCrops" onchange="update()" checked> הצג קווי חיתוך (7 מ"מ)</label>
    
    <button class="btn-print" onclick="window.print()" style="margin-top:20px;">הדפס קונטרס</button>
</div>

<div class="preview-container" id="preview"></div>

<script>
    // כאן תוכל להדביק את כל הטקסט הארוך שלך בתוך המרכאות
    const DATA = {
        tehillim: {
            'א': 'אַשְׁרֵי תְמִימֵי דָרֶךְ...', // תדביק כאן את כל הכתב לאות א'
            'ב': 'בַּמֶּה יְזַכֶּה נַּעַר...', 
            // וכך הלאה...
        },
        mishnayot: { 'נ':'...', 'ש':'...', 'מ':'...', 'ה':'...' },
        kaddish: {
            edot: "יִתְגַּדַּל וְיִתְקַדַּשׁ שְׁמֵהּ רַבָּא...\n(נוסח עדות המזרח)",
            ashkenaz: "יִתְגַּדַּל וְיִתְקַדַּשׁ שְׁמֵהּ רַבָּא...\n(נוסח אשכנז)",
            sfard: "יִתְגַּדַּל וְיִתְקַדַּשׁ שְׁמֵהּ רַבָּא...\n(נוסח ספרד)",
            teiman: "יִתְגַּדַּל וְיִתְקַדַּשׁ שְׁמֵהּ רַבָּא...\n(נוסח תימן - לעילא לעילא)"
        }
    };

    function addPage(isCover) {
        const page = document.createElement('div');
        page.className = 'print-page' + (document.getElementById('showCrops').checked ? ' crop-marks' : '');
        page.innerHTML = `
            <div class="cm cm-tl"></div><div class="cm cm-tr"></div>
            <div class="cm cm-bl"></div><div class="cm cm-br"></div>
            <img class="frame-img" src="${isCover ? '1.png' : '2.png'}" onerror="this.style.opacity='0'">
            <div class="content"></div>
        `;
        document.getElementById('preview').appendChild(page);
        return page.querySelector('.content');
    }

    function update() {
        const name = document.getElementById('inName').value || "ישראל";
        const family = document.getElementById('inFamily').value || "";
        const father = document.getElementById('inFather').value || "יצחק";
        const gender = document.getElementById('inGender').value;
        const nusach = document.getElementById('inNusach').value;
        const preview = document.getElementById('preview');
        preview.innerHTML = '';

        // עמוד שער
        const cover = addPage(true);
        cover.innerHTML = `<div style="font-size:30pt; margin-top:35mm;">לעילוי נשמת</div><div style="font-size:38pt; font-weight:bold; margin:15mm 0;">${name} ${gender} ${father}<br>${family}</div><div style="font-size:45pt;">ז"ל</div>`;

        // תהילים - פיצול עמודים אוטומטי (לפי כמות אותיות משוערת לעמוד)
        let currentContent = addPage(false);
        currentContent.innerHTML = `<div style="font-size:24pt; font-weight:bold; margin-bottom:10mm; text-decoration:underline;">תהילים פרק קי"ט</div>`;
        
        let charCount = 0;
        name.split('').forEach(l => {
            const txt = DATA.tehillim[l] || "טקסט חסר לאות " + l;
            if (charCount > 800) { // אם עברנו 800 תווים, פתח עמוד חדש
                currentContent = addPage(false);
                charCount = 0;
            }
            currentContent.innerHTML += `<span class="letter-tag">אות ${l}</span><div class="holy-text">${txt}</div>`;
            charCount += txt.length;
        });

        // משניות
        currentContent = addPage(false);
        currentContent.innerHTML = `<div style="font-size:24pt; font-weight:bold; margin-bottom:10mm; text-decoration:underline;">משניות נְשָׁמָה</div>`;
        ['נ','ש','מ','ה'].forEach(l => {
            currentContent.innerHTML += `<span class="letter-tag">אות ${l}</span><div class="holy-text">${DATA.mishnayot[l] || "טקסט משנה..."}</div>`;
        });

        // קדיש
        const kaddishPage = addPage(false);
        kaddishPage.innerHTML = `<div style="font-size:24pt; font-weight:bold; margin-bottom:8mm; text-decoration:underline;">קדיש דרבנן</div><div class="holy-text" style="text-align:center;">${DATA.kaddish[nusach]}</div>`;
    }

    window.onload = update;
</script>
</body>
</html>

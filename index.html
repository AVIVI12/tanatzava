<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>מחולל קונטרס מקצועי - גרסה סופית</title>
    <link href="https://fonts.googleapis.com/css2?family=Bona+Nova+SC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #2c3e50; --accent: #d4af37; --font: 'Bona Nova SC', serif; }

        /* --- הגדרות הדפסה דינמיות --- */
        @media print {
            /* הגדרת דף משתנה - נשלטת ע"י ה-Class ב-Body */
            @page { margin: 0; }
            body.pro-mode @page { size: 168.5mm 230mm; } /* דף גדול לקווי חיתוך */
            body.home-mode @page { size: A5; }            /* דף A5 מדויק */

            html, body { background: white !important; margin: 0 !important; padding: 0 !important; height: auto !important; }
            .ui-container { display: none !important; }
            .preview-container { background: white !important; padding: 0 !important; overflow: visible !important; width: 100% !important; }
            
            .print-page { 
                margin: 0 auto !important;
                box-shadow: none !important;
                page-break-after: always !important;
                border: none !important;
                background: white !important;
            }
            /* הוספת רווח להדפסת פרו */
            body.pro-mode .print-page { margin-top: 10mm !important; margin-bottom: 10mm !important; }
        }

        /* --- עיצוב ממשק --- */
        body { font-family: var(--font); background: #333; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        .ui-container { width: 380px; background: white; padding: 20px; box-shadow: 2px 0 15px rgba(0,0,0,0.5); overflow-y: auto; z-index: 100; }
        .preview-container { flex: 1; overflow-y: auto; padding: 40px; display: flex; flex-direction: column; align-items: center; scroll-behavior: smooth; }

        /* --- דף הקונטרס --- */
        .print-page {
            width: 148.5mm; height: 210mm; background: white; position: relative;
            margin-bottom: 50px; flex-shrink: 0; box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        /* --- קווי חיתוך (מוצגים רק ב-Pro Mode) --- */
        .crop-mark { display: none; position: absolute; width: 15mm; height: 15mm; z-index: 10; pointer-events: none; }
        body.pro-mode .crop-mark { display: block; }

        .crop-mark::before, .crop-mark::after { content: ""; position: absolute; background: black; }
        .cm-tl { top: -10mm; left: -10mm; }
        .cm-tl::before { width: 7mm; height: 0.2pt; top: 10mm; left: 0; }
        .cm-tl::after { width: 0.2pt; height: 7mm; left: 10mm; top: 0; }
        .cm-tr { top: -10mm; right: -10mm; }
        .cm-tr::before { width: 7mm; height: 0.2pt; top: 10mm; right: 0; }
        .cm-tr::after { width: 0.2pt; height: 7mm; right: 10mm; top: 0; }
        .cm-bl { bottom: -10mm; left: -10mm; }
        .cm-bl::before { width: 7mm; height: 0.2pt; bottom: 10mm; left: 0; }
        .cm-bl::after { width: 0.2pt; height: 7mm; left: 10mm; bottom: 0; }
        .cm-br { bottom: -10mm; right: -10mm; }
        .cm-br::before { width: 7mm; height: 0.2pt; bottom: 10mm; right: 0; }
        .cm-br::after { width: 0.2pt; height: 7mm; right: 10mm; bottom: 0; }

        /* תוכן שאר הדף */
        .frame-img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }
        .content { position: relative; z-index: 2; padding: 25mm 20mm; height: 100%; box-sizing: border-box; text-align: center; }
        
        button { width: 100%; padding: 12px; border: none; border-radius: 5px; cursor: pointer; font-family: var(--font); font-size: 1rem; margin-top: 10px; }
        .btn-print { background: var(--primary); color: white; font-size: 1.2rem; }
        .mode-toggle { display: flex; gap: 5px; background: #eee; padding: 5px; border-radius: 5px; margin-top: 10px; }
        .mode-toggle button { margin-top: 0; font-size: 0.8rem; background: transparent; }
        .mode-toggle button.active { background: white; box-shadow: 0 2px 5px rgba(0,0,0,0.1); font-weight: bold; }
        
        .holy-text { font-size: 15.5pt; line-height: 1.6; text-align: justify; white-space: pre-wrap; margin-bottom: 20px; }
        .letter-title { font-weight: bold; font-size: 19pt; display: block; margin: 15px 0 5px 0; }
    </style>
</head>
<body class="pro-mode"> <!-- ברירת מחדל: מצב דפוס -->

<div class="ui-container">
    <h2 style="border-bottom: 2px solid var(--accent); padding-bottom: 10px;">הגדרות קונטרס</h2>
    
    <div style="margin-bottom: 15px;">
        <label>שם הנפטר/ת:</label>
        <input type="text" id="inName" value="אברהם" oninput="update()" style="width:100%; padding:8px; margin-top:5px;">
    </div>

    <div style="margin-bottom: 15px;">
        <label>שם אב + משפחה:</label>
        <input type="text" id="inDetails" value="בן יצחק כהן" oninput="update()" style="width:100%; padding:8px; margin-top:5px;">
    </div>

    <div style="margin-bottom: 15px;">
        <label>נוסח קדיש:</label>
        <select id="inNusach" onchange="update()" style="width:100%; padding:8px; margin-top:5px;">
            <option value="edot">עדות המזרח</option>
            <option value="ashkenaz">אשכנז</option>
            <option value="sfard">ספרד</option>
            <option value="teiman">תימן</option>
        </select>
    </div>

    <label>סוג הדפסה:</label>
    <div class="mode-toggle">
        <button id="btnHome" onclick="setMode('home')">הדפסה ביתית (A5)</button>
        <button id="btnPro" class="active" onclick="setMode('pro')">דפוס מקצועי (+חיתוך)</button>
    </div>

    <button class="btn-print" onclick="window.print()">הדפס קונטרס מוכן</button>
</div>

<div class="preview-container" id="preview"></div>

<script>
    const DATA = {
        tehillim: {
            'א': 'אַשְׁרֵי תְמִימֵי דָרֶךְ הַהֹלְכִים בְּתוֹרַת יְהוָה: אַשְׁרֵי נֹצְרֵי עֵדֹתָיו בְּכָל לֵב יִדְרְשׁוּהוּ...',
            'ב': 'בַּמֶּה יְזַכֶּה נַּעַר אֶת אָרְחוֹ... תוכל להוסיף כאן את כל הטקסטים',
            // הוסף כאן את כל האותיות לפי אותו פורמט
        },
        mishnayot: {
            'נ': 'נִדָּה שֶׁהוֹצִיאָה דָם...',
            'ש': 'שְׁנַיִם אֹוחֲזִין בְּטַלִּית...',
            'מ': 'מֵאֵימָתַי קוֹרִין אֶת שְׁמַע...',
            'ה': 'הַמַּנִּיחַ אֶת הַכַּד בִּרְשׁוּת הָרַבִּים...'
        }
    };

    function setMode(mode) {
        if(mode === 'pro') {
            document.body.className = 'pro-mode';
            document.getElementById('btnPro').className = 'active';
            document.getElementById('btnHome').className = '';
        } else {
            document.body.className = 'home-mode';
            document.getElementById('btnHome').className = 'active';
            document.getElementById('btnPro').className = '';
        }
    }

    function createPage(isCover = false) {
        const page = document.createElement('div');
        page.className = 'print-page';
        page.innerHTML = `
            <div class="crop-mark cm-tl"></div><div class="crop-mark cm-tr"></div>
            <div class="crop-mark cm-bl"></div><div class="crop-mark cm-br"></div>
            <img class="frame-img" src="${isCover ? '1.png' : '2.png'}" onerror="this.style.opacity='0'">
            <div class="content"></div>
        `;
        document.getElementById('preview').appendChild(page);
        return page.querySelector('.content');
    }

    function update() {
        const name = document.getElementById('inName').value;
        const details = document.getElementById('inDetails').value;
        const preview = document.getElementById('preview');
        preview.innerHTML = '';

        // עמוד שער
        const cover = createPage(true);
        cover.innerHTML = `<div style="font-size:28pt; margin-top:40mm;">לעילוי נשמת</div><div style="font-size:36pt; font-weight:bold; margin:15mm 0;">${name}<br>${details}</div><div style="font-size:45pt;">ז"ל</div>`;

        // תהילים
        let current = createPage(false);
        current.innerHTML = `<div style="font-size:22pt; font-weight:bold; margin-bottom:10mm; text-decoration:underline;">תהילים פרק קי"ט</div>`;
        name.split('').forEach(l => {
            current.innerHTML += `<span class="letter-title">אות ${l}</span><div class="holy-text">${DATA.tehillim[l] || 'השלם טקסט...'}</div>`;
        });

        // משניות
        const mish = createPage(false);
        mish.innerHTML = `<div style="font-size:22pt; font-weight:bold; margin-bottom:10mm; text-decoration:underline;">משניות נְשָׁמָה</div>`;
        ['נ','ש','מ','ה'].forEach(l => {
            mish.innerHTML += `<span class="letter-title">אות ${l}</span><div class="holy-text">${DATA.mishnayot[l]}</div>`;
        });
    }

    window.onload = update;
</script>

</body>
</html>

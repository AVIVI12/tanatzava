<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>קונטרס תפילות - תיקון תמונות</title>
    <link href="https://fonts.googleapis.com/css2?family=Bona+Nova+SC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary-font: 'Bona Nova SC', serif; }
        
        /* פקודות קריטיות להדפסת צבעים ורקעים */
        * {
            -webkit-print-color-adjust: exact !important;
            print-color-adjust: exact !important;
            color-adjust: exact !important;
        }

        body { font-family: var(--primary-font); background-color: #555; margin: 0; padding: 20px; }

        @media print {
            @page { size: A5; margin: 0; }
            body { background: white; padding: 0; margin: 0; }
            .no-print { display: none; }
        }

        .page-container {
            background: white;
            width: 148.5mm;
            height: 210mm;
            margin: 10px auto;
            position: relative;
            page-break-after: always;
            overflow: hidden;
        }

        /* שכבת המסגרת - משתמשים בתמונה ממשית במקום רקע */
        .frame-layer {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
        }
        .frame-layer img {
            width: 100%; height: 100%;
            display: block;
        }

        .content-wrapper {
            position: relative;
            z-index: 2; /* מעל התמונה */
            padding: 25mm 20mm;
            height: 100%;
            box-sizing: border-box;
            text-align: center;
        }

        /* סימני חיתוך (Crop Marks) */
        .crop-mark {
            position: absolute; width: 8mm; height: 8mm;
            border: 0.5pt solid rgba(0,0,0,0.3); z-index: 5;
        }
        .cm-tl { top: 0; left: 0; border-right: none; border-bottom: none; }
        .cm-tr { top: 0; right: 0; border-left: none; border-bottom: none; }
        .cm-bl { bottom: 0; left: 0; border-right: none; border-top: none; }
        .cm-br { bottom: 0; right: 0; border-left: none; border-top: none; }

        .name-main { font-size: 36pt; font-weight: bold; margin-top: 10mm; }
        .text-flow { font-size: 16pt; line-height: 1.6; text-align: justify; }

        .no-print { background: white; padding: 20px; text-align: center; max-width: 400px; margin: auto; border-radius: 10px; }
        input { width: 90%; padding: 10px; margin: 5px; }
        button { padding: 15px 30px; cursor: pointer; background: #2c3e50; color: white; border: none; font-size: 1.1rem; }
    </style>
</head>
<body>

    <div class="no-print">
        <h3>הגדרות קונטרס</h3>
        <input type="text" id="deadName" placeholder="שם הנפטר/ת">
        <input type="text" id="fatherName" placeholder="שם האב">
        <button onclick="generate()">הפק קונטרס להדפסה</button>
        <p style="font-size: 0.8rem; color: red;">* וודא שהקבצים 1.png ו-2.png נמצאים באותה תיקיה</p>
    </div>

    <div id="output"></div>

    <script>
        function generate() {
            const name = document.getElementById('deadName').value;
            const father = document.getElementById('fatherName').value;
            const output = document.getElementById('output');
            output.innerHTML = '';

            // עמוד שער
            output.innerHTML += `
                <div class="page-container">
                    <div class="crop-mark cm-tl"></div><div class="crop-mark cm-tr"></div>
                    <div class="crop-mark cm-bl"></div><div class="crop-mark cm-br"></div>
                    <div class="frame-layer"><img src="1.png" alt="שער"></div>
                    <div class="content-wrapper">
                        <div style="font-size: 25pt; margin-top: 40mm;">לעילוי נשמת</div>
                        <div class="name-main">${name} בן ${father}</div>
                        <div style="font-size: 40pt; margin-top: 10mm;">ז"ל</div>
                    </div>
                </div>
            `;

            // עמוד תוכן לדוגמה
            output.innerHTML += `
                <div class="page-container">
                    <div class="crop-mark cm-tl"></div><div class="crop-mark cm-tr"></div>
                    <div class="crop-mark cm-bl"></div><div class="crop-mark cm-br"></div>
                    <div class="frame-layer"><img src="2.png" alt="רקע"></div>
                    <div class="content-wrapper">
                        <div style="font-size: 22pt; font-weight: bold; margin-bottom: 5mm;">תהילים ק"יט</div>
                        <div class="text-flow">
                            כאן יבוא הטקסט של התהילים...
                        </div>
                    </div>
                </div>
            `;

            setTimeout(() => { window.print(); }, 500);
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>מחולל קונטרס</title>
    <link href="https://fonts.googleapis.com/css2?family=Bona+Nova+SC:wght@400;700&family=Frank+Ruhl+Libre:wght@400;700;900&family=Heebo:wght@300;400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #d4af37;
            --sidebar: 370px;
        }

        /* ===== PRINT STYLES ===== */
        @media print {
            /* דפוס: גדול יותר מ-A5 כדי להכיל קווי חיתוך */
            body.pro-mode { }
            body.home-mode { }

            /* @page אחד - A5 */
            @page { size: 148.5mm 210mm; margin: 0; }

            html, body {
                background: white !important;
                margin: 0 !important;
                padding: 0 !important;
                width: 148.5mm !important;
            }
            .ui-container { display: none !important; }
            .preview-container {
                display: block !important;
                background: white !important;
                width: 148.5mm !important;
                padding: 0 !important;
                margin: 0 !important;
                overflow: visible !important;
            }

            /* ה-wrapper של קווי חיתוך - מאפשר overflow */
            .page-wrapper {
                overflow: visible !important;
                position: relative !important;
                width: 148.5mm !important;
                height: 210mm !important;
                margin: 0 !important;
                padding: 0 !important;
                page-break-after: always !important;
                page-break-inside: avoid !important;
                display: block !important;
            }
            /* מצב ביתי: העמוד מתחיל בדיוק בפינה 0,0 */
            body.home-mode .page-wrapper {
                margin: 0 !important;
            }

            .print-page {
                width: 148.5mm !important;
                height: 210mm !important;
                margin: 0 !important;
                box-shadow: none !important;
                display: block !important;
                border: none !important;
                overflow: hidden !important;
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
            }

            /* קווי חיתוך - רק במצב דפוס */
            body.pro-mode .crop-mark { display: block !important; }
            body.home-mode .crop-mark { display: none !important; }
        }

        /* ===== SCREEN STYLES ===== */
        * { box-sizing: border-box; }
        body {
            font-family: 'Frank Ruhl Libre', 'Bona Nova SC', serif;
            background: #2a2a2a;
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* --- Sidebar --- */
        .ui-container {
            width: var(--sidebar);
            background: #1a1a2e;
            padding: 20px;
            box-shadow: 4px 0 20px rgba(0,0,0,0.6);
            overflow-y: auto;
            z-index: 100;
            flex-shrink: 0;
            color: #eee;
        }

        .ui-container h2 {
            color: var(--accent);
            border-bottom: 2px solid var(--accent);
            padding-bottom: 10px;
            font-size: 1.3rem;
            margin-top: 0;
        }

        .section-title {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #888;
            margin: 18px 0 8px;
        }

        .form-group { margin-bottom: 10px; }
        label { display: block; font-size: 0.85rem; margin-bottom: 4px; color: #ccc; }
        input, select {
            width: 100%;
            padding: 9px 12px;
            border: 1px solid #444;
            border-radius: 6px;
            font-family: inherit;
            background: #2a2a40;
            color: #eee;
            font-size: 0.95rem;
        }
        input:focus, select:focus { outline: none; border-color: var(--accent); }

        .mode-toggle {
            display: flex;
            gap: 4px;
            background: #111;
            padding: 4px;
            border-radius: 8px;
            margin-bottom: 10px;
        }
        .mode-toggle button {
            flex: 1; padding: 8px; border: none; cursor: pointer;
            background: transparent; font-family: inherit; color: #aaa;
            border-radius: 6px; font-size: 0.85rem; transition: all 0.2s;
        }
        .mode-toggle button.active {
            background: var(--accent); color: #111; font-weight: bold;
        }

        /* Color swatches */
        .color-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 6px; }
        .color-swatch {
            width: 28px; height: 28px; border-radius: 50%; cursor: pointer;
            border: 2px solid transparent; transition: border 0.2s;
        }
        .color-swatch.active { border-color: white; }

        /* Font selector buttons */
        .font-row { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 6px; }
        .font-btn {
            padding: 6px 12px; border-radius: 6px; border: 1px solid #444;
            background: #2a2a40; color: #ccc; cursor: pointer; font-size: 0.85rem;
            transition: all 0.2s;
        }
        .font-btn.active { background: var(--accent); color: #111; border-color: var(--accent); font-weight: bold; }

        /* Buttons */
        .btn { 
            width: 100%; padding: 12px; border: none; border-radius: 8px;
            font-size: 1rem; cursor: pointer; margin-top: 8px;
            font-family: inherit; font-weight: bold; transition: opacity 0.2s;
        }
        .btn:hover { opacity: 0.85; }
        .btn-print { background: var(--primary); color: white; }
        .btn-pdf { background: var(--accent); color: #111; }

        /* --- Preview --- */
        .preview-container {
            flex: 1;
            overflow-y: auto;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: #525659;
            gap: 0;
        }

        /* wrapper שמאפשר overflow לקווי חיתוך */
        .page-wrapper {
            position: relative;
            width: 148.5mm;
            height: 210mm;
            margin-bottom: 30px;
            flex-shrink: 0;
            /* מרווח לקווי חיתוך במצב screen */
        }
        body.pro-mode .page-wrapper {
            margin: 15mm 15mm 20mm 15mm;
        }

        /* --- Pages --- */
        .print-page {
            width: 148.5mm;
            height: 210mm;
            background: white;
            position: relative;
            box-shadow: 0 4px 30px rgba(0,0,0,0.6);
            overflow: hidden;
        }

        .frame-img {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1; pointer-events: none;
            object-fit: fill; /* ממלא את כל העמוד בדיוק */
            display: block;
        }

        .content {
            position: relative; z-index: 2;
            padding: 22mm 16mm;
            height: 100%;
            text-align: center;
            overflow: hidden;
            direction: rtl;
        }

        /* --- Crop Marks --- */
        /* ה-crop marks ממוקמים ב-page-wrapper ולא ב-print-page,
           כך שהם לא נחתכים ע"י overflow:hidden של העמוד */
        .crop-mark {
            display: none;
            position: absolute;
            z-index: 20;
            width: 10mm; height: 10mm;
            pointer-events: none;
        }
        body.pro-mode .crop-mark { display: block; }

        .crop-mark::before, .crop-mark::after {
            content: "";
            position: absolute;
            background: black;
        }
        /* Top-Right (RTL) */
        .cm-tl { top: -2mm; right: -2mm; }
        .cm-tl::before { width: 8mm; height: 0.4px; top: 0; right: 2mm; }
        .cm-tl::after  { width: 0.4px; height: 8mm; right: 0; top: 2mm; }
        /* Top-Left (RTL) */
        .cm-tr { top: -2mm; left: -2mm; }
        .cm-tr::before { width: 8mm; height: 0.4px; top: 0; left: 2mm; }
        .cm-tr::after  { width: 0.4px; height: 8mm; left: 0; top: 2mm; }
        /* Bottom-Right (RTL) */
        .cm-bl { bottom: -2mm; right: -2mm; }
        .cm-bl::before { width: 8mm; height: 0.4px; bottom: 0; right: 2mm; }
        .cm-bl::after  { width: 0.4px; height: 8mm; right: 0; bottom: 2mm; }
        /* Bottom-Left (RTL) */
        .cm-br { bottom: -2mm; left: -2mm; }
        .cm-br::before { width: 8mm; height: 0.4px; bottom: 0; left: 2mm; }
        .cm-br::after  { width: 0.4px; height: 8mm; left: 0; bottom: 2mm; }

        /* --- Typography in pages --- */
        .cover-subtitle { font-size: 16pt; margin-top: 30mm; letter-spacing: 2px; }
        .name-row { font-size: 30pt; font-weight: bold; line-height: 1.2; margin-top: 6mm; }
        .family-row { font-size: 22pt; font-weight: bold; margin-top: 4mm; }
        .zl { font-size: 34pt; margin-top: 8mm; color: #333; }
        .page-header { font-size: 16pt; font-weight: bold; border-bottom: 1.5px solid #000; display: inline-block; margin-bottom: 8px; }
        .letter-title { font-weight: bold; font-size: 14pt; display: block; margin-top: 10px; text-decoration: underline; }
        .holy-text {
            font-size: 11pt;
            line-height: 1.7;
            text-align: justify;
            direction: rtl;
            margin-top: 4px;
        }
    </style>
</head>
<body class="pro-mode">

<div class="ui-container">
    <h2>✡ מחולל קונטרס</h2>

    <div class="section-title">פרטי הנפטר/ת</div>

    <div class="form-group">
        <label>שם הנפטר/ת</label>
        <input type="text" id="inName" value="אברהם" oninput="update()">
    </div>
    <div class="form-group">
        <label>מין</label>
        <select id="inGender" onchange="update()">
            <option value="בן">בן (זכר)</option>
            <option value="בת">בת (נקבה)</option>
        </select>
    </div>
    <div class="form-group">
        <label>שם האב</label>
        <input type="text" id="inFather" value="יצחק" oninput="update()">
    </div>
    <div class="form-group">
        <label>שם משפחה</label>
        <input type="text" id="inFamily" value="כהן" oninput="update()">
    </div>

    <div class="section-title">עיצוב</div>

    <label>גופן</label>
    <div class="font-row">
        <button class="font-btn active" onclick="setFont('Frank Ruhl Libre')" data-font="Frank Ruhl Libre">פרנק</button>
        <button class="font-btn" onclick="setFont('Bona Nova SC')" data-font="Bona Nova SC">בונה</button>
        <button class="font-btn" onclick="setFont('Heebo')" data-font="Heebo">היבו</button>
    </div>

    <label style="margin-top:12px;">צבע כותרות</label>
    <div class="color-row">
        <div class="color-swatch active" style="background:#2c3e50" title="כחול כהה" onclick="setColor('#2c3e50')"></div>
        <div class="color-swatch" style="background:#d4af37" title="זהב" onclick="setColor('#d4af37')"></div>
        <div class="color-swatch" style="background:#8b0000" title="אדום כהה" onclick="setColor('#8b0000')"></div>
        <div class="color-swatch" style="background:#2d6a4f" title="ירוק" onclick="setColor('#2d6a4f')"></div>
        <div class="color-swatch" style="background:#4a4a4a" title="אפור" onclick="setColor('#4a4a4a')"></div>
        <div class="color-swatch" style="background:#000000" title="שחור" onclick="setColor('#000000')"></div>
    </div>

    <div class="section-title">סוג הדפסה</div>
    <div class="mode-toggle">
        <button id="btnPro" class="active" onclick="setMode('pro')">דפוס (עם חיתוך)</button>
        <button id="btnHome" onclick="setMode('home')">ביתי (A5 נקי)</button>
    </div>

    <button class="btn btn-print" onclick="window.print()">🖨️ הדפס קונטרס</button>
    <button class="btn btn-pdf" onclick="exportPDF()">📄 ייצוא ל-PDF</button>
</div>

<div class="preview-container" id="preview"></div>

<script>
// ===== תהילים קי"ט - טקסט מלא לפי אותיות =====
const TEHILLIM_119 = {
    'א': `אַשְׁרֵי תְמִימֵי דָרֶךְ הַהֹלְכִים בְּתוֹרַת יְהוָה.
אַשְׁרֵי נֹצְרֵי עֵדֹתָיו בְּכָל לֵב יִדְרְשׁוּהוּ.
אַף לֹא פָעֲלוּ עַוְלָה בִּדְרָכָיו הָלָכוּ.
אַתָּה צִוִּיתָה פִקֻּדֶיךָ לִשְׁמֹר מְאֹד.
אַחֲלַי יִכֹּנוּ דְרָכָי לִשְׁמֹר חֻקֶּיךָ.
אָז לֹא אֵבוֹשׁ בְּהַבִּיטִי אֶל כָּל מִצְוֹתֶיךָ.
אוֹדְךָ בְּיֹשֶׁר לֵבָב בְּלָמְדִי מִשְׁפְּטֵי צִדְקֶךָ.
אֶת חֻקֶּיךָ אֶשְׁמֹר אַל תַּעַזְבֵנִי עַד מְאֹד.`,

    'ב': `בַּמֶּה יְזַכֶּה נַּעַר אֶת אָרְחוֹ לִשְׁמֹר כִּדְבָרֶךָ.
בְּכָל לִבִּי דְרַשְׁתִּיךָ אַל תַּשְׁגֵּנִי מִמִּצְוֹתֶיךָ.
בְּלִבִּי צָפַנְתִּי אִמְרָתֶךָ לְמַעַן לֹא אֶחֱטָא לָךְ.
בָּרוּךְ אַתָּה יְהוָה לַמְּדֵנִי חֻקֶּיךָ.
בִּשְׂפָתַי סִפַּרְתִּי כֹּל מִשְׁפְּטֵי פִיךָ.
בְּדֶרֶךְ עֵדְוֹתֶיךָ שַׂשְׂתִּי כְּעַל כָּל הוֹן.
בְּפִקֻּדֶיךָ אָשִׂיחָה וְאַבִּיטָה אֹרְחֹתֶיךָ.
בְּחֻקֹּתֶיךָ אֶשְׁתַּעֲשָׁע לֹא אֶשְׁכַּח דְּבָרֶךָ.`,

    'ג': `גְּמֹל עַל עַבְדְּךָ אֶחְיֶה וְאֶשְׁמְרָה דְבָרֶךָ.
גַּל עֵינַי וְאַבִּיטָה נִפְלָאוֹת מִתּוֹרָתֶךָ.
גֵּר אָנֹכִי בָאָרֶץ אַל תַּסְתֵּר מִמֶּנִּי מִצְוֹתֶיךָ.
גָּרְסָה נַפְשִׁי לְתַאֲבָה אֶל מִשְׁפָּטֶיךָ בְכָל עֵת.
גָּעַרְתָּ זֵדִים אֲרוּרִים הַשֹּׁגִים מִמִּצְוֹתֶיךָ.
גַּל מֵעָלַי חֶרְפָּה וָבוּז כִּי עֵדֹתֶיךָ נָצָרְתִּי.
גַּם יָשְׁבוּ שָׂרִים בִּי נִדְבָּרוּ עַבְדְּךָ יָשִׂיחַ בְּחֻקֶּיךָ.
גַּם עֵדֹתֶיךָ שַׁעֲשֻׁעָי אַנְשֵׁי עֲצָתִי.`,

    'ד': `דָּבְקָה לֶעָפָר נַפְשִׁי חַיֵּנִי כִּדְבָרֶךָ.
דְּרָכַי סִפַּרְתִּי וַתַּעֲנֵנִי לַמְּדֵנִי חֻקֶּיךָ.
דֶּרֶךְ פִּקּוּדֶיךָ הֲבִינֵנִי וְאָשִׂיחָה בְּנִפְלְאוֹתֶיךָ.
דָּלְפָה נַפְשִׁי מִתּוּגָה קַיְּמֵנִי כִּדְבָרֶךָ.
דֶּרֶךְ שֶׁקֶר הָסֵר מִמֶּנִּי וְתוֹרָתְךָ חָנֵּנִי.
דֶּרֶךְ אֱמוּנָה בָחָרְתִּי מִשְׁפָּטֶיךָ שִׁוִּיתִי.
דָּבַקְתִּי בְעֵדְוֹתֶיךָ יְהוָה אַל תְּבִישֵׁנִי.
דֶּרֶךְ מִצְוֹתֶיךָ אָרוּץ כִּי תַרְחִיב לִבִּי.`,

    'ה': `הוֹרֵנִי יְהוָה דֶּרֶךְ חֻקֶּיךָ וְאֶצְּרֶנָּה עֵקֶב.
הֲבִינֵנִי וְאֶצְּרָה תוֹרָתֶךָ וְאֶשְׁמְרֶנָּה בְכָל לֵב.
הַדְרִיכֵנִי בִּנְתִיב מִצְוֹתֶיךָ כִּי בוֹ חָפָצְתִּי.
הַט לִבִּי אֶל עֵדְוֹתֶיךָ וְאַל אֶל בָּצַע.
הַעֲבֵר עֵינַי מֵרְאוֹת שָׁוְא בִּדְרָכֶךָ חַיֵּנִי.
הָקֵם לְעַבְדְּךָ אִמְרָתֶךָ אֲשֶׁר לְיִרְאָתֶךָ.
הַעֲבֵר חֶרְפָּתִי אֲשֶׁר יָגֹרְתִּי כִּי מִשְׁפָּטֶיךָ טוֹבִים.
הִנֵּה תָּאַבְתִּי לְפִקֻּדֶיךָ בְּצִדְקָתְךָ חַיֵּנִי.`,

    'ו': `וִיבֹאֻנִי חֲסָדֶיךָ יְהוָה תְּשׁוּעָתְךָ כְּאִמְרָתֶךָ.
וְאֶעֱנֶה חֹרְפִי דָבָר כִּי בָטַחְתִּי בִּדְבָרֶךָ.
וְאַל תַּצֵּל מִפִּי דְבַר אֱמֶת עַד מְאֹד כִּי לְמִשְׁפָּטֶיךָ יִחָלְתִּי.
וְאֶשְׁמְרָה תוֹרָתְךָ תָמִיד לְעוֹלָם וָעֶד.
וְאֶתְהַלְּכָה בָרְחָבָה כִּי פִקֻּדֶיךָ דָרָשְׁתִּי.
וַאֲדַבְּרָה בְעֵדֹתֶיךָ נֶגֶד מְלָכִים וְלֹא אֵבוֹשׁ.
וְאֶשְׁתַּעֲשַׁע בְּמִצְוֹתֶיךָ אֲשֶׁר אָהָבְתִּי.
וְאֶשָּׂא כַפַּי אֶל מִצְוֹתֶיךָ אֲשֶׁר אָהָבְתִּי וְאָשִׂיחָה בְחֻקֶּיךָ.`,

    'ז': `זְכֹר דָּבָר לְעַבְדֶּךָ עַל אֲשֶׁר יִחַּלְתָּנִי.
זֹאת נֶחָמָתִי בְעָנְיִי כִּי אִמְרָתְךָ חִיָּתְנִי.
זֵדִים הֱלִיצֻנִי עַד מְאֹד מִתּוֹרָתְךָ לֹא נָטִיתִי.
זָכַרְתִּי מִשְׁפָּטֶיךָ מֵעוֹלָם יְהוָה וָאֶתְנֶחָם.
זַלְעָפָה אֲחָזַתְנִי מֵרְשָׁעִים עֹזְבֵי תוֹרָתֶךָ.
זְמִרוֹת הָיוּ לִי חֻקֶּיךָ בְּבֵית מְגוּרָי.
זָכַרְתִּי בַלַּיְלָה שִׁמְךָ יְהוָה וָאֶשְׁמְרָה תוֹרָתֶךָ.
זֹאת הָיְתָה לִּי כִּי פִקֻּדֶיךָ נָצָרְתִּי.`,

    'ח': `חֶלְקִי יְהוָה אָמַרְתִּי לִשְׁמֹר דְּבָרֶיךָ.
חִלִּיתִי פָנֶיךָ בְכָל לֵב חָנֵּנִי כְּאִמְרָתֶךָ.
חִשַּׁבְתִּי דְרָכָי וָאָשִׁיבָה רַגְלַי אֶל עֵדֹתֶיךָ.
חַשְׁתִּי וְלֹא הִתְמַהְמָהְתִּי לִשְׁמֹר מִצְוֹתֶיךָ.
חֶבְלֵי רְשָׁעִים עִוְּדֻנִי תוֹרָתְךָ לֹא שָׁכָחְתִּי.
חֲצוֹת לַיְלָה אָקוּם לְהוֹדוֹת לָךְ עַל מִשְׁפְּטֵי צִדְקֶךָ.
חָבֵר אָנִי לְכָל אֲשֶׁר יְרֵאוּךָ וּלְשֹׁמְרֵי פִּקּוּדֶיךָ.
חַסְדְּךָ יְהוָה מָלְאָה הָאָרֶץ חֻקֶּיךָ לַמְּדֵנִי.`,

    'ט': `טוֹב עָשִׂיתָ עִם עַבְדְּךָ יְהוָה כִּדְבָרֶךָ.
טוּב טַעַם וָדַעַת לַמְּדֵנִי כִּי בְמִצְוֹתֶיךָ הֶאֱמָנְתִּי.
טֶרֶם אֶעֱנֶה אֲנִי שֹׁגֶג וְעַתָּה אִמְרָתְךָ שָׁמָרְתִּי.
טוֹב אַתָּה וּמֵטִיב לַמְּדֵנִי חֻקֶּיךָ.
טָפְלוּ עָלַי שֶׁקֶר זֵדִים אֲנִי בְּכָל לֵב אֱצֹּר פִּקּוּדֶיךָ.
טָפַשׁ כַּחֵלֶב לִבָּם אֲנִי תוֹרָתְךָ שִׁעֲשָׁעְתִּי.
טוֹב לִי כִי עֻנֵּיתִי לְמַעַן אֶלְמַד חֻקֶּיךָ.
טוֹב לִי תוֹרַת פִּיךָ מֵאַלְפֵי זָהָב וָכָסֶף.`,

    'י': `יָדֶיךָ עָשׂוּנִי וַיְכוֹנְנוּנִי הֲבִינֵנִי וְאֶלְמְדָה מִצְוֹתֶיךָ.
יְרֵאֶיךָ יִרְאוּנִי וְיִשְׂמָחוּ כִּי לִדְבָרְךָ יִחָלְתִּי.
יָדַעְתִּי יְהוָה כִּי צֶדֶק מִשְׁפָּטֶיךָ וֶאֱמוּנָה עִנִּיתָנִי.
יְהִי נָא חַסְדְּךָ לְנַחֲמֵנִי כְּאִמְרָתְךָ לְעַבְדֶּךָ.
יְבֹאוּנִי רַחֲמֶיךָ וְאֶחְיֶה כִּי תוֹרָתְךָ שַׁעֲשֻׁעָי.
יֵבֹשׁוּ זֵדִים כִּי שֶׁקֶר עִוְּתוּנִי אֲנִי אָשִׂיחַ בְּפִקּוּדֶיךָ.
יָשׁוּבוּ לִי יְרֵאֶיךָ וְיֹדְעֵי עֵדֹתֶיךָ.
יְהִי לִבִּי תָמִים בְּחֻקֶּיךָ לְמַעַן לֹא אֵבוֹשׁ.`,

    'כ': `כָּלְתָה לִתְשׁוּעָתְךָ נַפְשִׁי לִדְבָרְךָ יִחָלְתִּי.
כָּלוּ עֵינַי לְאִמְרָתֶךָ לֵאמֹר מָתַי תְּנַחֲמֵנִי.
כִּי הָיִיתִי כְּנֹאד בְּקִיטוֹר חֻקֶּיךָ לֹא שָׁכָחְתִּי.
כַּמָּה יְמֵי עַבְדֶּךָ מָתַי תַּעֲשֶׂה בְרֹדְפַי מִשְׁפָּט.
כָּרוּ לִי זֵדִים שִׁיחוֹת אֲשֶׁר לֹא כְתוֹרָתֶךָ.
כָּל מִצְוֹתֶיךָ אֱמוּנָה שֶׁקֶר רְדָפוּנִי עָזְרֵנִי.
כִּמְעַט כִּלּוּנִי בָאָרֶץ וַאֲנִי לֹא עָזַבְתִּי פִקֻּדֶיךָ.
כְּחַסְדְּךָ חַיֵּנִי וְאֶשְׁמְרָה עֵדוּת פִּיךָ.`,

    'ל': `לְעוֹלָם יְהוָה דְּבָרְךָ נִצָּב בַּשָּׁמָיִם.
לְדֹר וָדֹר אֱמוּנָתֶךָ כּוֹנַנְתָּ אֶרֶץ וַתַּעֲמֹד.
לְמִשְׁפָּטֶיךָ עָמְדוּ הַיּוֹם כִּי הַכֹּל עֲבָדֶיךָ.
לוּלֵי תוֹרָתְךָ שַׁעֲשֻׁעָי אָז אָבַדְתִּי בְעָנְיִי.
לְעוֹלָם לֹא אֶשְׁכַּח פִּקּוּדֶיךָ כִּי בָם חִיִּיתָנִי.
לְךָ אֲנִי הוֹשִׁיעֵנִי כִּי פִקּוּדֶיךָ דָרָשְׁתִּי.
לִי קִוּוּ רְשָׁעִים לְאַבְּדֵנִי עֵדֹתֶיךָ אֶתְבּוֹנָן.
לְכָל תִּכְלָה רָאִיתִי קֵץ רְחָבָה מִצְוָתְךָ מְאֹד.`,

    'מ': `מָה אָהַבְתִּי תוֹרָתֶךָ כָּל הַיּוֹם הִיא שִׂיחָתִי.
מֵאֹיְבַי תְּחַכְּמֵנִי מִצְוֹתֶךָ כִּי לְעוֹלָם הִיא לִי.
מִכָּל מְלַמְּדַי הִשְׂכַּלְתִּי כִּי עֵדְוֹתֶיךָ שִׂיחָה לִי.
מִזְּקֵנִים אֶתְבּוֹנָן כִּי פִקּוּדֶיךָ נָצָרְתִּי.
מִכָּל אֹרַח רָע כָּלִאתִי רַגְלַי לְמַעַן אֶשְׁמֹר דְּבָרֶךָ.
מִמִּשְׁפָּטֶיךָ לֹא סָרְתִּי כִּי אַתָּה הוֹרֵתָנִי.
מַה נִּמְלְצוּ לְחִכִּי אִמְרָתֶךָ מִדְּבַשׁ לְפִי.
מִפִּקּוּדֶיךָ אֶתְבּוֹנָן עַל כֵּן שָׂנֵאתִי כָּל אֹרַח שָׁקֶר.`,

    'נ': `נֵר לְרַגְלִי דְבָרֶךָ וְאוֹר לִנְתִיבָתִי.
נִשְׁבַּעְתִּי וָאֲקַיֵּמָה לִשְׁמֹר מִשְׁפְּטֵי צִדְקֶךָ.
נַעֲנֵיתִי עַד מְאֹד יְהוָה חַיֵּנִי כִדְבָרֶךָ.
נִדְבוֹת פִּי רְצֵה נָא יְהוָה וּמִשְׁפָּטֶיךָ לַמְּדֵנִי.
נַפְשִׁי בְכַפִּי תָמִיד וְתוֹרָתְךָ לֹא שָׁכָחְתִּי.
נָתְנוּ רְשָׁעִים פַּח לִי וּמִפִּקּוּדֶיךָ לֹא תָעִיתִי.
נָחַלְתִּי עֵדְוֹתֶיךָ לְעוֹלָם כִּי שְׂשׂוֹן לִבִּי הֵמָּה.
נָטִיתִי לִבִּי לַעֲשׂוֹת חֻקֶּיךָ לְעוֹלָם עֵקֶב.`,

    'ס': `סֵעֲפִים שָׂנֵאתִי וְתוֹרָתְךָ אָהָבְתִּי.
סִתְרִי וּמָגִנִּי אָתָּה לִדְבָרְךָ יִחָלְתִּי.
סוּרוּ מִמֶּנִּי מְרֵעִים וְאֶצְּרָה מִצְוֹת אֱלֹהָי.
סָמְכֵנִי כְאִמְרָתְךָ וְאֶחְיֶה וְאַל תְּבִישֵׁנִי מִשִּׂבְרִי.
סְעָדֵנִי וְאִוָּשֵׁעָה וְאֶשְׁעָה בְחֻקֶּיךָ תָמִיד.
סָלִיתָ כָּל שׁוֹגִים מֵחֻקֶּיךָ כִּי שֶׁקֶר תַּרְמִיתָם.
סִגִּים הִשְׁבַּתָּ כָל רִשְׁעֵי אָרֶץ לָכֵן אָהַבְתִּי עֵדֹתֶיךָ.
סָמַר מִפַּחְדְּךָ בְשָׂרִי וּמִמִּשְׁפָּטֶיךָ יָרֵאתִי.`,

    'ע': `עָשִׂיתִי מִשְׁפָּט וָצֶדֶק בַּל תַּנִּיחֵנִי לְעֹשְׁקָי.
עֲרֹב עַבְדְּךָ לְטוֹב אַל יַעַשְׁקֻנִי זֵדִים.
עֵינַי כָּלוּ לִישׁוּעָתֶךָ וּלְאִמְרַת צִדְקֶךָ.
עֲשֵׂה עִם עַבְדְּךָ כְחַסְדֶּךָ וְחֻקֶּיךָ לַמְּדֵנִי.
עַבְדְּךָ אָנִי הֲבִינֵנִי וְאֵדְעָה עֵדֹתֶיךָ.
עֵת לַעֲשׂוֹת לַיהוָה הֵפֵרוּ תּוֹרָתֶךָ.
עַל כֵּן אָהַבְתִּי מִצְוֹתֶיךָ מִזָּהָב וּמִפָּז.
עַל כֵּן כָּל פִּקּוּדֵי כֹל יִשָּׁרְתִּי כָּל אֹרַח שֶׁקֶר שָׂנֵאתִי.`,

    'פ': `פְּלָאוֹת עֵדְוֹתֶיךָ עַל כֵּן נְצָרָתַם נַפְשִׁי.
פֵּתַח דְּבָרֶיךָ יָאִיר מֵבִין פְּתָיִים.
פִּי פָעַרְתִּי וָאֶשְׁאָפָה כִּי לְמִצְוֹתֶיךָ יָאָבְתִּי.
פְּנֵה אֵלַי וְחָנֵּנִי כְּמִשְׁפָּט לְאֹהֲבֵי שְׁמֶךָ.
פְּעָמַי הָכֵן בְּאִמְרָתֶךָ וְאַל תַּשְׁלֶט בִּי כָל אָוֶן.
פְּדֵנִי מֵעֹשֶׁק אָדָם וְאֶשְׁמְרָה פִּקּוּדֶיךָ.
פָּנֶיךָ הָאֵר בְּעַבְדֶּךָ וְלַמְּדֵנִי אֶת חֻקֶּיךָ.
פַּלְגֵי מַיִם יָרְדוּ עֵינָי עַל לֹא שָׁמְרוּ תוֹרָתֶךָ.`,

    'צ': `צַדִּיק אַתָּה יְהוָה וְיָשָׁר מִשְׁפָּטֶיךָ.
צִוִּיתָ צֶדֶק עֵדֹתֶיךָ וֶאֱמוּנָה מְאֹד.
צִמְּתַתְנִי קִנְאָתִי כִּי שָׁכְחוּ דְבָרֶיךָ צָרָי.
צְרוּפָה אִמְרָתְךָ מְאֹד וְעַבְדְּךָ אֲהֵבָהּ.
צָעִיר אָנֹכִי וְנִבְזֶה פִּקֻּדֶיךָ לֹא שָׁכָחְתִּי.
צִדְקָתְךָ צֶדֶק לְעוֹלָם וְתוֹרָתְךָ אֱמֶת.
צַר וּמָצוֹק מְצָאוּנִי מִצְוֹתֶיךָ שַׁעֲשֻׁעָי.
צֶדֶק עֵדְוֹתֶיךָ לְעוֹלָם הֲבִינֵנִי וְאֶחְיֶה.`,

    'ק': `קָרָאתִי בְכָל לֵב עֲנֵנִי יְהוָה חֻקֶּיךָ אֶצֹּרָה.
קְרָאתִיךָ הוֹשִׁיעֵנִי וְאֶשְׁמְרָה עֵדֹתֶיךָ.
קִדַּמְתִּי בַנֶּשֶׁף וָאֲשַׁוֵּעָה לִדְבָרְךָ יִחָלְתִּי.
קִדְּמוּ עֵינַי אַשְׁמֻרוֹת לָשִׂיחַ בְּאִמְרָתֶךָ.
קוֹלִי שִׁמְעָה כְחַסְדֶּךָ יְהוָה כְּמִשְׁפָּטֶךָ חַיֵּנִי.
קָרְבוּ רֹדְפֵי זִמָּה מִתּוֹרָתְךָ רָחָקוּ.
קָרוֹב אַתָּה יְהוָה וְכָל מִצְוֹתֶיךָ אֱמֶת.
קֶדֶם יָדַעְתִּי מֵעֵדֹתֶיךָ כִּי לְעוֹלָם יְסַדְתָּם.`,

    'ר': `רְאֵה עָנְיִי וְחַלְּצֵנִי כִּי תוֹרָתְךָ לֹא שָׁכָחְתִּי.
רִיבָה רִיבִי וּגְאָלֵנִי לְאִמְרָתְךָ חַיֵּנִי.
רָחוֹק מֵרְשָׁעִים יְשׁוּעָה כִּי חֻקֶּיךָ לֹא דָרָשׁוּ.
רַחֲמֶיךָ רַבִּים יְהוָה כְּמִשְׁפָּטֶיךָ חַיֵּנִי.
רַבִּים רֹדְפַי וְצָרָי מֵעֵדְוֹתֶיךָ לֹא נָטִיתִי.
רָאִיתִי בֹגְדִים וָאֶתְקוֹטָטָה אֲשֶׁר אִמְרָתְךָ לֹא שָׁמָרוּ.
רְאֵה כִּי פִקּוּדֶיךָ אָהָבְתִּי יְהוָה כְּחַסְדְּךָ חַיֵּנִי.
רֹאשׁ דְּבָרְךָ אֱמֶת וּלְעוֹלָם כָּל מִשְׁפַּט צִדְקֶךָ.`,

    'ש': `שָׂרִים רְדָפוּנִי חִנָּם וּמִדְּבָרְךָ פָּחַד לִבִּי.
שָׂשׂ אָנֹכִי עַל אִמְרָתֶךָ כְּמוֹצֵא שָׁלָל רָב.
שֶׁקֶר שָׂנֵאתִי וַאֲתַעֵבָה תּוֹרָתְךָ אָהָבְתִּי.
שֶׁבַע בַּיּוֹם הִלַּלְתִּיךָ עַל מִשְׁפְּטֵי צִדְקֶךָ.
שָׁלוֹם רָב לְאֹהֲבֵי תוֹרָתֶךָ וְאֵין לָמוֹ מִכְשׁוֹל.
שִׂבַּרְתִּי לִישׁוּעָתְךָ יְהוָה וּמִצְוֹתֶיךָ עָשִׂיתִי.
שָׁמְרָה נַפְשִׁי עֵדֹתֶיךָ וָאֹהֲבֵם מְאֹד.
שָׁמַרְתִּי פִקּוּדֶיךָ וְעֵדֹתֶיךָ כִּי כָל דְּרָכַי נֶגְדֶּךָ.`,

    'ת': `תִּקְרַב רִנָּתִי לְפָנֶיךָ יְהוָה כִּדְבָרְךָ הֲבִינֵנִי.
תָּבֹא תְחִנָּתִי לְפָנֶיךָ כְּאִמְרָתְךָ הַצִּילֵנִי.
תַּבַּעְנָה שְׂפָתַי תְּהִלָּה כִּי תְלַמְּדֵנִי חֻקֶּיךָ.
תַּעַן לְשׁוֹנִי אִמְרָתֶךָ כִּי כָל מִצְוֹתֶיךָ צֶדֶק.
תְּהִי יָדְךָ לְעָזְרֵנִי כִּי פִקּוּדֶיךָ בָחָרְתִּי.
תָּאַבְתִּי לִישׁוּעָתְךָ יְהוָה וְתוֹרָתְךָ שַׁעֲשֻׁעָי.
תְּחִי נַפְשִׁי וּתְהַלְלֶךָ וּמִשְׁפָּטֶיךָ יַעְזְרֻנִי.
תָּעִיתִי כְּשֶׂה אֹבֵד בַּקֵּשׁ עַבְדֶּךָ כִּי מִצְוֹתֶיךָ לֹא שָׁכָחְתִּי.`
};

// ===== STATE =====
let currentFont = 'Frank Ruhl Libre';
let currentColor = '#2c3e50';

function setMode(mode) {
    document.body.className = mode === 'pro' ? 'pro-mode' : 'home-mode';
    document.getElementById('btnPro').className = mode === 'pro' ? 'active' : '';
    document.getElementById('btnHome').className = mode === 'home' ? 'active' : '';
    update();
}

function setFont(font) {
    currentFont = font;
    document.querySelectorAll('.font-btn').forEach(b => {
        b.className = b.dataset.font === font ? 'font-btn active' : 'font-btn';
    });
    update();
}

function setColor(color) {
    currentColor = color;
    document.querySelectorAll('.color-swatch').forEach(s => {
        s.className = s.style.background === color || s.style.backgroundColor === color ? 'color-swatch active' : 'color-swatch';
    });
    update();
}

function addPage(isCover = false) {
    // wrapper: מאפשר overflow לקווי חיתוך (print-page עצמו overflow:hidden)
    const wrapper = document.createElement('div');
    wrapper.className = 'page-wrapper';
    wrapper.innerHTML = `
        <div class="crop-mark cm-tl"></div>
        <div class="crop-mark cm-tr"></div>
        <div class="crop-mark cm-bl"></div>
        <div class="crop-mark cm-br"></div>
    `;

    const div = document.createElement('div');
    div.className = 'print-page';
    div.style.fontFamily = currentFont + ', serif';
    // 1.png = עמוד שער/סיום בלבד, 2.png = כל שאר העמודים
    div.innerHTML = `
        <img class="frame-img" src="${isCover ? '1.png' : '2.png'}" onerror="this.style.opacity='0'">
        <div class="content" style="font-family: '${currentFont}', serif;"></div>
    `;
    wrapper.appendChild(div);
    document.getElementById('preview').appendChild(wrapper);
    return div.querySelector('.content');
}

function update() {
    const name   = document.getElementById('inName').value.trim();
    const gender = document.getElementById('inGender').value;
    const father = document.getElementById('inFather').value.trim();
    const family = document.getElementById('inFamily').value.trim();
    const preview = document.getElementById('preview');
    preview.innerHTML = '';

    // ---- עמוד שער ----
    const cover = addPage(true);
    cover.innerHTML = `
        <div class="cover-subtitle" style="color:${currentColor}">לעילוי נשמת</div>
        <div class="name-row" style="color:${currentColor}">${name} ${gender} ${father}</div>
        <div class="family-row" style="color:${currentColor}">${family}</div>
        <div class="zl">ז"ל</div>
        <div style="margin-top:15mm; font-size:13pt; color:#555; line-height:1.8;">
            תְּהֵא נִשְׁמָתוֹ צְרוּרָה<br>בִּצְרוֹר הַחַיִּים
        </div>
    `;

    // ---- עמודי תהילים ----
    const letters = name.split('').filter(l => TEHILLIM_119[l]);
    
    if (letters.length === 0) {
        const pg = addPage(false);
        pg.innerHTML = `<div style="margin-top:30mm; font-size:14pt; color:#999">לא נמצאו אותיות מתאימות בתהילים קי"ט</div>`;
        return;
    }

    // נחשב תוכן לכל עמוד — פונקציה פשוטה לחלוקה לדפים
    // כל 2 אותיות בערך בדף אחד
    let pageContent = addPage(false);
    pageContent.innerHTML = `<div class="page-header" style="color:${currentColor}">תהילים קי"ט</div>`;
    let charCount = 0;
    const MAX_CHARS_PER_PAGE = 900;

    letters.forEach((letter, i) => {
        const text = TEHILLIM_119[letter];
        const block = `<span class="letter-title" style="color:${currentColor}">אות ${letter}</span><div class="holy-text">${text}</div>`;
        charCount += text.length;

        if (charCount > MAX_CHARS_PER_PAGE && i > 0) {
            pageContent = addPage(false);
            pageContent.innerHTML = `<div class="page-header" style="color:${currentColor}">תהילים קי"ט (המשך)</div>`;
            charCount = text.length;
        }
        pageContent.innerHTML += block;
    });

    // ---- עמוד סיום ----
    const closing = addPage(true);
    closing.innerHTML = `
        <div style="margin-top:40mm; font-size:20pt; font-weight:bold; color:${currentColor}">יְהִי רָצוֹן</div>
        <div style="margin-top:10mm; font-size:13pt; line-height:2; color:#444; text-align:justify; padding:0 10mm;">
            שֶׁתְּהֵא נִשְׁמַת ${name} ${gender} ${father} ${family}<br>
            צְרוּרָה בִּצְרוֹר הַחַיִּים עִם שְׁאָר נִשְׁמוֹת<br>
            צַדִּיקֵי עוֹלָם, וְתָנוּחַ עַל מִשְׁכָּבוֹ בְּשָׁלוֹם
        </div>
        <div style="margin-top:15mm; font-size:28pt; font-weight:bold; color:${currentColor}">אָמֵן</div>
    `;
}

// ===== PDF Export =====
async function exportPDF() {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a5' });

    const pages = document.querySelectorAll('.print-page');
    const btn = document.querySelector('.btn-pdf');
    btn.textContent = '⏳ מייצא...';
    btn.disabled = true;

    try {
        for (let i = 0; i < pages.length; i++) {
            if (i > 0) doc.addPage([148.5, 210], 'portrait');

            const canvas = await html2canvas(pages[i], {
                scale: 2,
                useCORS: true,
                allowTaint: true,
                backgroundColor: '#ffffff',
                width: pages[i].offsetWidth,
                height: pages[i].offsetHeight,
                logging: false
            });

            const imgData = canvas.toDataURL('image/jpeg', 0.92);
            doc.addImage(imgData, 'JPEG', 0, 0, 148.5, 210);
        }

        const name = document.getElementById('inName').value || 'קונטרס';
        doc.save(`קונטרס_${name}.pdf`);
    } catch(e) {
        console.error(e);
        alert('שגיאה בייצוא ל-PDF: ' + e.message);
    }

    btn.textContent = '📄 ייצוא ל-PDF';
    btn.disabled = false;
}

window.onload = update;
</script>

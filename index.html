<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מחולל קונטרס תפילות - Live Preview</title>
    <link href="https://fonts.googleapis.com/css2?family=Bona+Nova+SC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #d4af37;
            --bg: #f8f9fa;
            --font: 'Bona Nova SC', serif;
        }

        /* הגדרות הדפסה קריטיות - פותר את הבעיה בכרום */
        @media print {
            @page { size: A5; margin: 0; }
            body { margin: 0; padding: 0; background: white; }
            .ui-container { display: none !important; }
            .print-page { 
                margin: 0 !important; 
                box-shadow: none !important; 
                page-break-after: always;
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
            }
        }

        /* עיצוב הממשק (UI) */
        body { font-family: var(--font); background: var(--bg); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        .ui-container {
            width: 400px; background: white; padding: 25px; box-shadow: 2px 0 10px rgba(0,0,0,0.1);
            overflow-y: auto; z-index: 100;
        }

        .preview-container {
            flex: 1; overflow-y: auto; padding: 40px; display: flex; flex-direction: column; align-items: center; background: #525659;
        }

        h2 { color: var(--primary); border-bottom: 2px solid var(--accent); padding-bottom: 10px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; color: #444; }
        input, select { 
            width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; 
            font-family: var(--font); font-size: 1rem; box-sizing: border-box;
        }
        
        button.print-btn {
            width: 100%; padding: 15px; background: var(--primary); color: white;
            border: none; border-radius: 6px; font-size: 1.2rem; cursor: pointer; margin-top: 20px;
        }
        button.print-btn:hover { background: #1a252f; }

        /* עיצוב הדף המודפס (A5) */
        .print-page {
            width: 148.5mm; height: 210mm; background: white; position: relative;
            margin-bottom: 20px; box-shadow: 0 0 20px rgba(0,0,0,0.4);
            flex-shrink: 0; overflow: hidden;
        }

        .frame-img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        .content { position: relative; z-index: 2; padding: 25mm 18mm; height: 100%; box-sizing: border-box; text-align: center; }

        /* סגנונות טקסט בתוך הקונטרס */
        .title-lg { font-size: 32pt; font-weight: bold; margin-top: 30mm; }
        .name-lg { font-size: 38pt; font-weight: bold; margin: 15mm 0; line-height: 1.1; }
        .zl { font-size: 45pt; color: #333; }
        .section-title { font-size: 24pt; font-weight: bold; margin-bottom: 10mm; text-decoration: underline; }
        .text-body { font-size: 15pt; line-height: 1.5; text-align: justify; white-space: pre-wrap; }
        .letter-header { font-weight: bold; font-size: 18pt; display: block; margin-top: 15px; border-top: 1px solid #eee; }

        /* סימני חיתוך */
        .crop { position: absolute; width: 10mm; height: 10mm; border: 0.2pt solid #ccc; z-index: 5; }
        .tl { top: 0; left: 0; border-right: none; border-bottom: none; }
        .tr { top: 0; right: 0; border-left: none; border-bottom: none; }
        .bl { bottom: 0; left: 0; border-right: none; border-top: none; }
        .br { bottom: 0; right: 0; border-left: none; border-top: none; }
    </style>
</head>
<body>

<div class="ui-container">
    <h2>הגדרות קונטרס</h2>
    
    <div class="form-group">
        <label>שם הנפטר/ת:</label>
        <input type="text" id="inName" value="אברהם" oninput="update()">
    </div>
    
    <div class="form-group">
        <label>שם משפחה:</label>
        <input type="text" id="inFamily" value="כהן" oninput="update()">
    </div>

    <div class="form-group">
        <label>שם האב:</label>
        <input type="text" id="inFather" value="יצחק" oninput="update()">
    </div>

    <div class="form-group">
        <label>מין:</label>
        <select id="inGender" onchange="update()">
            <option value="זכר">זכר (בן)</option>
            <option value="נקבה">נקבה (בת)</option>
        </select>
    </div>

    <div class="form-group">
        <label>נוסח:</label>
        <select id="inNusach" onchange="update()">
            <option value="edot">עדות המזרח</option>
            <option value="ashkenaz">אשכנז / ספרד</option>
        </select>
    </div>

    <button class="print-btn" onclick="window.print()">הדפס קונטרס מוכן (A5)</button>
    
    <div style="margin-top: 30px; font-size: 0.9rem; color: #666;">
        <p>💡 <b>טיפ להדפסה:</b> בחלון ההדפסה של כרום, וודאו שמרג'ינס (Margins) על "None" וסמנו "Background Graphics".</p>
    </div>
</div>

<div class="preview-container" id="preview">
    <!-- העמודים ייווצרו כאן דינמית -->
</div>

<script>
    // מאגר טקסטים
    const DATA = {
        tehillim: {
            'א': 'אַשְׁרֵי תְמִימֵי דָרֶךְ הַהֹלְכִים בְּתוֹרַת יְהוָה: אַשְׁרֵי נֹצְרֵי עֵדֹתָיו בְּכָל לֵב יִדְרְשׁוּהוּ: אַף לֹא פָעֲלוּ עַוְלָה בִּדְרָכָיו הָלָכוּ...',
            'ב': 'בַּמֶּה יְזַכֶּה נַּעַר אֶת אָרְחוֹ לִשְׁמֹר כִּדְבָרֶךָ: בְּכָל לִבִּי דְרַשְׁתִּיךָ אַל תַּשְׁגֵּנִי מִמִּצְוֹתֶיךָ...',
            'ה': 'הוֹרֵנִי יְהוָה דֶּרֶךְ חֻקֶּיךָ וְאֶצְּרֶנָּה עֵקֶב: הֲבִינֵנִי וְאֶצְּרָה תוֹרָתֶךָ וְאֶשְׁמְרֶנָּה בְכָל לֵב...',
            'מ': 'מָה אָהַבְתִּי תוֹרָתֶךָ כָּל הַיֹּום הִיא שִׂיחָתִי: מֵאֹויְבַי תְּחַכְּמֵנִי מִצְוֹתֶיךָ...',
            'נ': 'נֵר לְרַגְלִי דְבָרֶךָ וְאֹור לִנְתִיבָתִי: נִשְׁבַּעְתִּי וָאֲקַיֵּמָה לִשְׁמֹר מִשְׁפְּטֵי צִדְקֶךָ...',
            'ר': 'רְאֵה עָנְיִי וְחַלְּצֵנִי כִּי תֹורָתְךָ לֹא שָׁכָחְתִּי: רִיבָה רִיבִי וּגְאָלֵנִי...',
            'ש': 'שָׂרִים רְדָפוּנִי חִנָּם וּמִדְּבָרֶיךָ פָּחַד לִבִּי: שָׂשׂ אָנֹכִי עַל אִמְרָתֶךָ...',
            // הערה: כאן יש להוסיף את כל שאר ה-א"ב לפי הצורך
        },
        mishnayot: {
            'נ': 'נִדָּה שֶׁהוֹצִיאָה דָם, בֵּית שַׁמַּאי אוֹמְרִים: צְרִיכָה דְבֵילָה...',
            'ש': 'שְׁנַיִם אֹוחֲזִין בְּטַלִּית, זֶה אֹומֵר אֲנִי מְצָאתִיהָ וְזֶה אֹומֵר אֲנִי מְצָאתִיהָ...',
            'מ': 'מֵאֵימָתַי קוֹרִין אֶת שְׁמַע בְּעַרְבִית? מִשָּׁעָה שֶׁהַכֹּהֲנִים נִכְנָסִים לֶאֱכֹל בִּתְרוּמָתָן...',
            'ה': 'הַמַּנִּיחַ אֶת הַכַּד בִּרְשׁוּת הָרַבִּים וּבָא אַחֵר וְנִתְקַל בָּהּ וּשְׁבָרָהּ, פָּטוּר...'
        },
        kaddish: {
            edot: "יִתְגַּדַּל וְיִתְקַדַּשׁ שְׁמֵהּ רַבָּא. (אָמֵן)\nבְּעָלְמָא דִּי בְרָא כִרְעוּתֵהּ, וְיַמְלִיךְ מַלְכוּתֵהּ...\n(נוסח עדות המזרח המלא כאן)",
            ashkenaz: "יִתְגַּדַּל וְיִתְקַדַּשׁ שְׁמֵהּ רַבָּא...\n(נוסח אשכנז המלא כאן)"
        }
    };

    function createPageElement(isCover) {
        const div = document.createElement('div');
        div.className = 'print-page';
        div.innerHTML = `
            <div class="crop tl"></div><div class="crop tr"></div>
            <div class="crop bl"></div><div class="crop br"></div>
            <img class="frame-img" src="${isCover ? '1.png' : '2.png'}" onerror="this.style.display='none'">
            <div class="content"></div>
        `;
        return div;
    }

    function update() {
        const name = document.getElementById('inName').value;
        const family = document.getElementById('inFamily').value;
        const father = document.getElementById('inFather').value;
        const gender = document.getElementById('inGender').value;
        const nusach = document.getElementById('inNusach').value;
        const preview = document.getElementById('preview');
        
        preview.innerHTML = '';

        // עמוד 1: שער
        const cover = createPageElement(true);
        cover.querySelector('.content').innerHTML = `
            <div class="title-lg">תפילות לעילוי נשמת</div>
            <div class="name-lg">${name} ${gender === 'זכר' ? 'בן' : 'בת'} ${father}<br>${family}</div>
            <div class="zl">ז"ל</div>
        `;
        preview.appendChild(cover);

        // עמוד 2: תהילים
        const p2 = createPageElement(false);
        let tehillimHtml = `<div class="section-title">תהילים - אותיות השם</div><div class="text-body">`;
        name.split('').forEach(l => {
            if(DATA.tehillim[l]) tehillimHtml += `<span class="letter-header">אות ${l}</span>${DATA.tehillim[l]}`;
        });
        tehillimHtml += `</div>`;
        p2.querySelector('.content').innerHTML = tehillimHtml;
        preview.appendChild(p2);

        // עמוד 3: משניות נשמ"ה
        const p3 = createPageElement(false);
        let mishnaHtml = `<div class="section-title">משניות - נְשָׁמָה</div><div class="text-body">`;
        ['נ','ש','מ','ה'].forEach(l => {
            mishnaHtml += `<span class="letter-header">אות ${l}</span>${DATA.mishnayot[l] || 'טקסט משנה...'}`;
        });
        mishnaHtml += `</div>`;
        p3.querySelector('.content').innerHTML = mishnaHtml;
        preview.appendChild(p3);

        // עמוד 4: קדיש
        const p4 = createPageElement(false);
        p4.querySelector('.content').innerHTML = `
            <div class="section-title">קדיש דרבנן</div>
            <div class="text-body" style="text-align:center; font-size:13pt;">${DATA.kaddish[nusach]}</div>
        `;
        preview.appendChild(p4);
    }

    // הפעלה ראשונית
    window.onload = update;
</script>

</body>
</html>
